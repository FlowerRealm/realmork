<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realmork</title>
    <link rel="preload" href="./fonts/realmork-sans-sc-vf.woff2" as="font" type="font/woff2" />
    <style>
      @font-face {
        font-family: "Realmork Sans";
        src: url("./fonts/realmork-sans-sc-vf.woff2") format("woff2");
        font-style: normal;
        font-weight: 200 900;
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --font-sans: "Realmork Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
        font-family: var(--font-sans);
        font-synthesis: none;
        text-rendering: auto;
        -webkit-font-smoothing: auto;
        -moz-osx-font-smoothing: auto;
        background: #edf3f8;
        color: #182330;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background: #edf3f8;
        color: #182330;
        font-family: var(--font-sans);
        font-weight: 400;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
