<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realmork</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Noto Sans SC", "PingFang SC", sans-serif;
        background: #e7ebf0;
        color: #1f2630;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 42%),
          radial-gradient(circle at bottom right, rgba(195, 207, 223, 0.56), transparent 40%),
          #e7ebf0;
      }

      .boot-shell {
        display: grid;
        place-items: center;
      }

      .boot-loader {
        position: relative;
        width: 176px;
        height: 176px;
        display: grid;
        place-items: center;
      }

      .boot-loader::before,
      .boot-loader::after,
      .boot-ring,
      .boot-core {
        position: absolute;
        border-radius: 999px;
      }

      .boot-loader::before,
      .boot-loader::after {
        content: "";
        filter: blur(16px);
      }

      .boot-loader::before {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.68);
        animation: pulse 2.4s ease-in-out infinite;
      }

      .boot-loader::after {
        width: 70px;
        height: 70px;
        background: rgba(195, 207, 223, 0.78);
        animation: pulse 2.4s ease-in-out infinite 0.28s;
      }

      .boot-ring {
        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .boot-ring::before {
        content: "";
        position: absolute;
        top: -5px;
        left: calc(50% - 5px);
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(33, 41, 52, 0.74);
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.18);
      }

      .boot-ring-a {
        animation: spin 2.8s linear infinite;
      }

      .boot-ring-b {
        inset: 20px;
        border-color: rgba(255, 255, 255, 0.3);
        animation: spin-reverse 2.1s linear infinite;
      }

      .boot-core {
        width: 36px;
        height: 36px;
        background: linear-gradient(180deg, rgba(33, 41, 52, 0.84), rgba(92, 103, 118, 0.68));
        box-shadow: 0 12px 28px rgba(70, 82, 97, 0.2);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.38;
          transform: scale(0.88);
        }

        50% {
          opacity: 0.82;
          transform: scale(1);
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        from {
          transform: rotate(360deg);
        }

        to {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="boot-shell">
      <div class="boot-loader" aria-hidden="true">
        <span class="boot-ring boot-ring-a"></span>
        <span class="boot-ring boot-ring-b"></span>
        <span class="boot-core"></span>
      </div>
    </main>
  </body>
</html>
