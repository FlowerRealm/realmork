<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realmork</title>
    <style>
      :root {
        /* 温暖琥珀沙砾 HSL */
        --h: 35;
        --s: 10%;
        --page: hsl(var(--h), var(--s), 97%);
        --surface: hsl(var(--h), var(--s), 91%);
        --surface-strong: hsl(var(--h), var(--s), 86%);
        --action: hsl(25, 15%, 35%);
        --text: hsl(25, 15%, 15%);
        --text-soft: hsl(25, 10%, 45%);
        --warn: hsl(15, 20%, 50%);
        
        --font-sans: "Inter", "system-ui", "-apple-system", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: var(--page);
        color: var(--text);
        font-family: var(--font-sans);
        letter-spacing: 0.03em;
      }

      body.is-error {
        --action: var(--warn);
      }

      .boot-shell {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .warm-loader-stack {
        width: 48px;
        height: 48px;
        border: 3px solid var(--surface-strong);
        border-top-color: var(--action);
        border-radius: 50%;
        animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .boot-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 8px 0;
        letter-spacing: -0.02em;
      }

      .boot-copy {
        font-size: 14px;
        color: var(--text-soft);
        margin: 0;
        font-weight: 300;
      }

      body.is-error .warm-loader-stack {
        animation-play-state: paused;
        border-color: var(--warn);
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <main class="boot-shell">
      <div class="warm-loader-stack"></div>
      <div class="boot-text">
        <p class="boot-title" data-role="title">正在准备 Realmork</p>
        <p class="boot-copy" data-role="copy">正在准备界面与作业数据，请稍候。</p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const state = params.get("state");
      if (state === "error") {
        document.body.classList.add("is-error");
        document.querySelector("[data-role='title']").textContent = "启动失败";
        document.querySelector("[data-role='copy']").textContent = "本地服务未就绪，请稍后重试。";
      }
    </script>
  </body>
</html>
